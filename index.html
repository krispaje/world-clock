<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>World clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select>
        <option value="">Select a city</option>
        <option value="london">London 🇬🇧</option>
        <option value="los-angeles">Los Angeles 🇺🇸</option>
        <option value="sydney">Sydney 🇦🇺</option>
      </select>

      <div class="city">
        <div class="left-content">
          <h2>London 🇬🇧</h2>
          <div class="date">June 15th 2026</div>
        </div>
        <div class="time">6:56:10 <spanc class="AMPM">PM</span></div>
      </div>
      <div class="city">
        <div class="left-content">
          <h2>Los Angeles 🇺🇸</h2>
          <div class="date">June 15th 2026</div>
        </div>
        <div class="time">10:56:10 <span class="AMPM">AM</span></div>
      </div>
    </div>

    <footer>
      <br />
      Coded by Kristina Pajėdienė, open sourced
      <a href="https://github.com/krispaje/world-clock" target="_blank"
        >Github</a
      >
      and hosted on
      <a href="https://world-clocks-projektas.netlify.app/" target="_blank"
        >Netlify</a
      >
    </footer>
    <script src="js/index.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.1/moment-timezone-with-data-1970-2030.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <title>World clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select id="city">
        <option value="">Select a city</option>
        <option value="current">My current location</option>
        <option value="Europe/London">London 🇬🇧</option>
        <option value="America/Los_Angeles">Los Angeles 🇺🇸</option>
        <option value="Australia/Sydney">Sydney 🇦🇺</option>
      </select>
      <div class="cities">
        <div class="city" id="londonCity">
          <div class="left-content">
            <h2>London 🇬🇧</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div class="city" id="losAngelesCity">
          <div class="left-content">
            <h2>Los Angeles 🇺🇸</h2>
            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>
    </div>
    <footer>
      <br />
      Coded by Kristina Pajėdienė, open sourced
      <a href="https://github.com/krispaje/world-clock" target="_blank"
        >Github</a
      >
      and hosted on
      <a href="https://world-clocks-projektas.netlify.app/" target="_blank"
        >Netlify</a
      >
    </footer>
    <script src="js/index.js"></script>
  </body>
</html>
